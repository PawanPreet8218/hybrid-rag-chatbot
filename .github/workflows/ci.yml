name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    name: Lint, type-check & test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies (no heavy ML wheels)
        # The unit tests are model-free, so install only what they need —
        # this keeps CI fast and avoids pulling torch/transformers.
        run: |
          python -m pip install --upgrade pip
          pip install \
            "pydantic>=2.7" "pydantic-settings>=2.3" "python-dotenv>=1.0" \
            "pandas>=2.2" "langchain-core>=1.0.0" "langchain-community>=0.4.0" \
            "rank-bm25>=0.2.2" \
            pytest pytest-cov ruff mypy

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Mypy (type-check core package)
        run: mypy src/sage/config.py src/sage/io_utils.py src/sage/exceptions.py
        continue-on-error: true

      - name: Pytest
        env:
          GROQ_API_KEY: dummy-key-for-tests
        run: pytest --cov=sage --cov-report=term-missing
